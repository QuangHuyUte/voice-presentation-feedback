<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
<defs>
<style>
.title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#172033}.sub{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#526071}.label{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#172033}.small{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#4b5563}.tiny{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#64748b}.box{rx:18;ry:18;stroke:#d9e2ef;stroke-width:2}.arrow{stroke:#536173;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}.pill{rx:14;ry:14}.mono{font:600 13px 'Consolas','Courier New',monospace;fill:#223}
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#536173"/></marker>
<linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#e8f2ff"/></linearGradient>
<linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
<linearGradient id="g3" x1="0" x2="1"><stop offset="0" stop-color="#ecfdf5"/><stop offset="1" stop-color="#d1fae5"/></linearGradient>
<linearGradient id="g4" x1="0" x2="1"><stop offset="0" stop-color="#fdf2f8"/><stop offset="1" stop-color="#fce7f3"/></linearGradient>
</defs>
<rect width="1300" height="760" fill="#fbfcff"/>
<text x="70" y="70" class="title">Validation-Weighted Ensemble</text>
<text x="70" y="102" class="sub">The final model trusts branches according to validation macro-F1.</text>

<rect x="90" y="170" width="300" height="120" class="box" fill="url(#g2)"/>
<text x="125" y="212" class="label">Temporal model</text>
<text x="125" y="242" class="mono">p1 = [B, 6]</text>
<text x="125" y="267" class="small">weight w1 = val macro-F1</text>

<rect x="90" y="330" width="300" height="120" class="box" fill="url(#g3)"/>
<text x="125" y="372" class="label">Spectrogram model</text>
<text x="125" y="402" class="mono">p2 = [B, 6]</text>
<text x="125" y="427" class="small">weight w2 = val macro-F1</text>

<rect x="90" y="490" width="300" height="120" class="box" fill="url(#g4)"/>
<text x="125" y="532" class="label">Statistical model</text>
<text x="125" y="562" class="mono">p3 = [B, 6]</text>
<text x="125" y="587" class="small">weight w3 = val macro-F1</text>

<path d="M390 230 C490 230 535 360 615 360" class="arrow"/>
<path d="M390 390 C500 390 535 390 615 390" class="arrow"/>
<path d="M390 550 C490 550 535 420 615 420" class="arrow"/>

<rect x="615" y="300" width="360" height="180" class="box" fill="#ffffff"/>
<text x="660" y="350" class="label">Weighted average</text>
<text x="650" y="390" class="mono">final_prob = Σ(wᵢ · pᵢ) / Σwᵢ</text>
<text x="660" y="430" class="small">If one branch is weak on validation,</text>
<text x="660" y="456" class="small">its influence is automatically reduced.</text>

<path d="M975 390 C1045 390 1060 390 1110 390" class="arrow"/>
<rect x="1110" y="330" width="140" height="120" class="box" fill="#172033" stroke="#172033"/>
<text x="1140" y="374" class="label" style="fill:#fff">argmax</text>
<text x="1136" y="405" class="small" style="fill:#dbeafe">6 emotions</text>
</svg>