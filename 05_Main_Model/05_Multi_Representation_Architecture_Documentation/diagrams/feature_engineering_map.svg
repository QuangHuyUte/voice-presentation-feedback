<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880">
<defs>
<style>
.title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#172033}.sub{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#526071}.label{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#172033}.small{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#4b5563}.tiny{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#64748b}.box{rx:18;ry:18;stroke:#d9e2ef;stroke-width:2}.arrow{stroke:#536173;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}.pill{rx:14;ry:14}.mono{font:600 13px 'Consolas','Courier New',monospace;fill:#223}
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#536173"/></marker>
<linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#e8f2ff"/></linearGradient>
<linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
<linearGradient id="g3" x1="0" x2="1"><stop offset="0" stop-color="#ecfdf5"/><stop offset="1" stop-color="#d1fae5"/></linearGradient>
<linearGradient id="g4" x1="0" x2="1"><stop offset="0" stop-color="#fdf2f8"/><stop offset="1" stop-color="#fce7f3"/></linearGradient>
</defs>
<rect width="1400" height="880" fill="#fbfcff"/>
<text x="70" y="70" class="title">Unified Feature Engineering Map</text>
<text x="70" y="102" class="sub">Each feature group is routed to the model type that can use it best.</text>

<rect x="70" y="150" width="260" height="560" class="box" fill="#ffffff"/>
<text x="105" y="190" class="label">Raw speech</text>
<text x="105" y="220" class="small">16 kHz mono waveform</text>
<text x="105" y="252" class="small">Emotion is expressed through:</text>
<text x="105" y="284" class="tiny">• timbre / MFCC shape</text>
<text x="105" y="312" class="tiny">• energy / loudness</text>
<text x="105" y="340" class="tiny">• pitch-harmonic structure</text>
<text x="105" y="368" class="tiny">• spectral brightness</text>
<text x="105" y="396" class="tiny">• temporal dynamics</text>

<path d="M330 430 C390 430 400 250 460 250" class="arrow"/>
<path d="M330 430 C390 430 400 430 460 430" class="arrow"/>
<path d="M330 430 C390 430 400 610 460 610" class="arrow"/>

<rect x="460" y="165" width="380" height="170" class="box" fill="url(#g2)"/>
<text x="495" y="205" class="label">Temporal sequence features</text>
<text x="495" y="235" class="small">MFCC + delta + delta-delta</text>
<text x="495" y="262" class="small">RMS, ZCR, centroid, bandwidth</text>
<text x="495" y="289" class="small">rolloff, spectral contrast</text>
<text x="495" y="316" class="mono">Shape: [T, 132]</text>

<rect x="460" y="345" width="380" height="170" class="box" fill="url(#g3)"/>
<text x="495" y="385" class="label">Spectrogram representation</text>
<text x="495" y="415" class="small">log-Mel time-frequency map</text>
<text x="495" y="442" class="small">pretrained feature extractor or</text>
<text x="495" y="469" class="small">3-channel local log-Mel fallback</text>
<text x="495" y="496" class="mono">Shape: [time, mel] or [3, mel, time]</text>

<rect x="460" y="525" width="380" height="190" class="box" fill="url(#g4)"/>
<text x="495" y="565" class="label">Statistical vector</text>
<text x="495" y="595" class="small">mean/std/min/max over full clip</text>
<text x="495" y="622" class="small">MFCC, chroma, spectral, RMS, ZCR</text>
<text x="495" y="649" class="small">energy, entropy of energy</text>
<text x="495" y="681" class="mono">Shape: [D]</text>

<path d="M840 250 C920 250 940 250 1010 250" class="arrow"/>
<path d="M840 430 C920 430 940 430 1010 430" class="arrow"/>
<path d="M840 620 C920 620 940 620 1010 620" class="arrow"/>

<rect x="1010" y="180" width="300" height="130" class="box" fill="#fff"/>
<text x="1045" y="220" class="label">1D temporal model</text>
<text x="1045" y="250" class="small">Learns dynamic emotion cues</text>
<text x="1045" y="278" class="tiny">CNN → BiGRU → Attention</text>

<rect x="1010" y="365" width="300" height="130" class="box" fill="#fff"/>
<text x="1045" y="405" class="label">2D/pretrained model</text>
<text x="1045" y="435" class="small">Learns time-frequency patterns</text>
<text x="1045" y="463" class="tiny">Pretrained encoder / 2D-CNN</text>

<rect x="1010" y="555" width="300" height="130" class="box" fill="#fff"/>
<text x="1045" y="595" class="label">Classical ML model</text>
<text x="1045" y="625" class="small">Uses global acoustic summary</text>
<text x="1045" y="653" class="tiny">Scaler → RBF-SVM</text>
</svg>